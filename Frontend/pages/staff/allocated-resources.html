<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Allocate Resource</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/auth.css"> </head>
<body>
    <div class="main-content" style="margin-left: 260px;">
        <h1>New Allocation</h1>
        <div class="auth-card" style="max-width: 600px; margin-top: 20px;">
            <form id="allocationForm">
                <div class="form-group">
                    <label>Select User (Email/ID)</label>
                    <input type="text" id="userEmail" placeholder="Enter user email" required>
                </div>
                <div class="form-group">
                    <label>Select Resource</label>
                    <select id="resourceId" style="width: 100%; padding: 10px; border-radius: 6px;">
                        </select>
                </div>
                <div class="form-group">
                    <label>Duration (Hours/Days)</label>
                    <input type="number" id="duration" required>
                </div>
                <button type="submit" class="btn-login">Confirm Allocation</button>
            </form>
        </div>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/allocations.js"></script>
</body>
</html>
