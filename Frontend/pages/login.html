<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Resource Management System</title>
    <link rel="stylesheet" href="../assests/css/style.css">
    <link rel="stylesheet" href="../assests/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Login</h1>
            <p style="text-align: center; color: #64748b; margin-bottom: 20px;">
                Enter your credentials to access the system.
            </p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@institution.edu" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: #3b82f6; text-decoration: none;">Register here</a>
            </div>
        </div>
    </div>

    <script src="../assests/js/api.js"></script>
    <script src="../assests/js/auth.js"></script>
    <script>
        // Attach the event listener from auth.js
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
